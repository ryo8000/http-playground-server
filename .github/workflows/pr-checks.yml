# This workflow gates pull requests. It always creates a required check,
# but only runs the expensive test and Docker image build jobs for changes
# that can affect the application, tests, or image.

name: PR Checks

on:
  pull_request:
    branches:
      - main
      - review

jobs:
  detect-changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_checks: ${{ steps.filter.outputs.run_checks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > changed-files.txt

          echo "Changed files:"
          cat changed-files.txt

          if grep -Eq '^(src/|tests/|package\.json$|yarn\.lock$|tsconfig\.json$|eslint\.config\.mjs$|jest\.config\.js$|\.prettierrc$|Dockerfile$|\.dockerignore$|\.github/workflows/(pr-checks|docker-publish)\.yml$)' changed-files.txt; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    # For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
    name: Test & Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.run_checks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linting
        run: yarn lint

      - name: Run unit tests
        run: yarn test

      - name: Build application
        run: yarn build

      - name: Start server in background
        run: |
          node dist/server.js &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/; do sleep 1; done'

      - name: Run E2E tests with Newman
        run: |
          newman run tests/e2e/e2e-test-collection.json \
            -e tests/e2e/environment.json \
            --reporters cli,json \
            --reporter-json-export e2e-test-results.json

      - name: Stop server
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi
        if: always()

      - name: Upload unit tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: coverage/
        if: always()

      - name: Upload E2E tests results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: e2e-test-results.json
        if: always()

  docker-build:
    name: Docker image build
    needs: detect-changes
    if: needs.detect-changes.outputs.run_checks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Use docker.io for Docker Hub if empty
      REGISTRY: ghcr.io
      # github.repository as <account>/<repo>
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,format=short

      # Build Docker image with Buildx
      # https://github.com/docker/build-push-action
      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  required:
    name: Required PR checks
    needs:
      - detect-changes
      - test
      - docker-build
    if: always()
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Verify required checks
        run: |
          if [ "${{ needs.detect-changes.result }}" != "success" ]; then
            echo "Changes detection job result was ${{ needs.detect-changes.result }}; blocking merge."
            exit 1
          fi

          if [ "${{ needs.detect-changes.outputs.run_checks }}" != "true" ]; then
            echo "No application, test, or image changes detected; required checks are satisfied."
            exit 0
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test job result was ${{ needs.test.result }}; blocking merge."
            exit 1
          fi

          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "Docker image build job result was ${{ needs.docker-build.result }}; blocking merge."
            exit 1
          fi

          echo "Test and Docker image build jobs passed."
